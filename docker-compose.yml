services:
  cli-proxy-api:
    # 使用本地源码构建，不拉取远端镜像
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: none
        BUILD_DATE: unknown
    container_name: cli-proxy-api
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml
      - ./auths:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
    restart: unless-stopped
